<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <style>
      .text {
        font-family: 'Inter', 'Montserrat', 'Arial', sans-serif;
        font-weight: 500;
        fill: #9ad6cf;
      }
    </style>
  </defs>

  <!-- Brain icon -->
  <g transform="translate(40,40) scale(1.1)">
    <!-- left half -->
    <path d="M80 0
             C30 0, 0 40, 0 80
             C0 120, 30 160, 80 160
             C110 160, 110 0, 80 0Z"
          fill="#f2f5f7" stroke="#9fb0b8" stroke-width="4"/>

    <!-- right half -->
    <path d="M80 0
             C130 0, 160 40, 160 80
             C160 120, 130 160, 80 160
             C50 160, 50 0, 80 0Z"
          fill="#bfe4df" stroke="#7fbab2" stroke-width="4"/>

    <!-- center line -->
    <line x1="80" y1="5" x2="80" y2="155" stroke="#7fa7ad" stroke-width="4"/>
  </g>

  <!-- Text -->
  <text x="260" y="120" class="text" font-size="64">Психолог</text>
  <text x="260" y="190" class="text" font-size="64">Сергій Петров</text>
</svg>
